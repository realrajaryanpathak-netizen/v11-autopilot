name: V11 Trading Bot

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to run'
        required: true
        default: 'rebalance'
        type: choice
        options:
          - rebalance
          - crash-check
          - status

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_MODE: paper
          INITIAL_CAPITAL: '1000000'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.action }}" = "rebalance" ]; then
            python daily_job.py --rebalance
          else
            python daily_job.py
          fi

      - name: Save state to repo
        run: |
          git config user.name "V11 Bot"
          git config user.email "bot@v11.trade"
          git add state.json trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 $(date +%Y-%m-%d)"
          git push || true